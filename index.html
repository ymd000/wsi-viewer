<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSI Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/openseadragon@4.1.0/build/openseadragon/openseadragon.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        #viewer {
            width: 100%;
            height: 600px;
            border: 2px solid #ddd;
            border-radius: 5px;
            background-color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>WSI Viewer</h1>
        <div id="viewer"></div>
    </div>

    <script>
        // OpenSeadragon初期化
        const viewer = OpenSeadragon({
            id: "viewer",
            prefixUrl: "https://cdn.jsdelivr.net/npm/openseadragon@4.1.0/build/openseadragon/images/",
            tileSources: 'samples/sample.dzi',
            showNavigator: true,
            navigatorPosition: 'BOTTOM_RIGHT',
            showHomeControl: true,
            showZoomControl: true,
            showFullPageControl: true,
            animationTime: 0.5,
            blendTime: 0.1,
            constrainDuringPan: false,
            maxZoomPixelRatio: 2,
            minZoomLevel: 0.1,
            visibilityRatio: 0.5,
            zoomPerScroll: 2.0
        });

        // エラーハンドリング
        viewer.addHandler('open-failed', function(event) {
            console.error('Failed to load WSI image:', event);
            document.getElementById('viewer').innerHTML = '<div style="color: red; text-align: center; padding: 50px;">画像の読み込みに失敗しました。<br>samples/sample.dzi が存在することを確認してください。</div>';
        });

        // 初期化完了時のログ出力
        viewer.addHandler('open', function() {
            console.log('WSI Viewer initialized successfully');
            console.log('Image dimensions:', viewer.world.getItemAt(0).getContentSize());
        });

        // ズームイベントのログ
        viewer.addHandler('zoom', function(event) {
            console.log('Zoom level:', event.zoom);
        });
    </script>
</body>
</html>
